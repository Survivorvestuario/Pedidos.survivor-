<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURVIVOR - Gestión Integral</title>
    <style>
        /* Estilos Verdes Profesionales */
        body { font-family: 'Segoe UI', sans-serif; background-color: #e8f5e9; padding: 20px; margin: 0; color: #2e7d32; }
        .container { max-width: 1100px; margin: 0 auto; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #c8e6c9; }
        .navbar { display: flex; align-items: center; gap: 15px; background: #2e7d32; padding: 15px 20px; border-radius: 8px; color: white; margin-bottom: 20px; }
        
        /* Logo */
        .logo-marca { height: 50px; width: 50px; object-fit: cover; border-radius: 4px; background: #fff; padding: 2px; border: 2px solid #fff; }
        
        input, select { padding: 10px; border: 1px solid #a5d6a7; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #2e7d32; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .vista { display: none; } .vista.activa { display: block; }
        
        /* Estilos de tabla y tarjetas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #c8e6c9; padding: 10px; text-align: center; }
        th { background: #2e7d32; color: white; }
        .total-row { font-weight: bold; background: #dcedc8; font-size: 16px; }
        
        .item-producto { border: 1px solid #c8e6c9; border-radius: 8px; padding: 10px; background: #f1f8e9; text-align: center; }
        .img-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; border: 2px solid #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <!-- VISTA CLIENTES -->
    <div id="vistaClientes" class="vista activa">
        <div class="navbar">
            <img id="logoCli" src="https://via.placeholder.com/50" class="logo-marca">
            <h1>SURVIVOR</h1>
            <button onclick="conmutarVista('admin')" style="background: #1b5e20; margin-left: auto;">🔐 Admin</button>
        </div>
        <div class="box">
            <h2>Catálogo de Prendas</h2>
            <div id="galeriaCliente" style="display:flex; gap:15px; flex-wrap:wrap;"></div>
        </div>
    </div>

    <!-- VISTA ADMIN -->
    <div id="vistaAdmin" class="vista">
        <div class="navbar" style="background: #1b5e20;">
            <img id="logoAdmin" src="https://via.placeholder.com/50" class="logo-marca">
            <h1>Panel Admin</h1>
            <button onclick="conmutarVista('clientes')" style="background: #2e7d32; margin-left: auto;">🛒 Ver Tienda</button>
        </div>

        <div class="box">
            <h3>Registro de Stock</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <input type="text" id="prodNombre" placeholder="Nombre">
                <select id="prodCuello"><option>Cuello Redondo</option><option>Cuello Medio</option></select>
                <input type="number" id="prodStock" placeholder="Cantidad">
            </div>
            <button onclick="registrarStock()">Agregar al Inventario</button>
        </div>

        <div class="box">
            <h3>Inventario Total</h3>
            <table id="tablaCatalogo">
                <thead><tr><th>Producto</th><th>Cuello</th><th>Stock</th></tr></thead>
                <tbody id="bodyInventario"></tbody>
                <tfoot><tr class="total-row"><td colspan="2">TOTAL DISPONIBLE</td><td id="totalStock">0</td></tr></tfoot>
            </table>
        </div>

        <div class="box">
            <h3>Configuración de Empresa</h3>
            <label>Subir Logo:</label>
            <input type="file" id="fotoLogo" accept="image/*">
            <button onclick="subirLogo()">Actualizar Logo</button>
            
            <h3 style="margin-top:20px;">Prendas (Fotos y Descripción)</h3>
            <input type="text" id="nombrePrendaRef" placeholder="Nombre">
            <input type="text" id="descPrendaRef" placeholder="Descripción">
            <input type="file" id="fotoPrenda" accept="image/*">
            <button onclick="subirFotoPrenda()" style="background: #1b5e20;">Subir Prenda</button>
        </div>
    </div>
</div>

<script>
    const dbURL = "https://tienda-survivor-default-rtdb.firebaseio.com/";

    // --- LOGICA ---
    function conmutarVista(destino) {
        if (destino === 'admin') {
            if(prompt("Contraseña:") === "admin123") {
                document.getElementById('vistaClientes').classList.remove('activa');
                document.getElementById('vistaAdmin').classList.add('activa');
            }
        } else {
            document.getElementById('vistaAdmin').classList.remove('activa');
            document.getElementById('vistaClientes').classList.add('activa');
        }
    }

    function subirLogo() {
        let file = document.getElementById('fotoLogo').files[0];
        if(file) {
            let reader = new FileReader();
            reader.onloadend = () => {
                fetch(`${dbURL}config.json`, { method: "PUT", body: JSON.stringify({ logo: reader.result }) }).then(sincronizar);
            };
            reader.readAsDataURL(file);
        }
    }

    function registrarStock() {
        let item = { 
            nombre: document.getElementById('prodNombre').value, 
            cuello: document.getElementById('prodCuello').value, 
            stock: parseInt(document.getElementById('prodStock').value) || 0 
        };
        fetch(`${dbURL}inventario.json`, { method: "POST", body: JSON.stringify(item) }).then(sincronizar);
    }

    function subirFotoPrenda() {
        let file = document.getElementById('fotoPrenda').files[0];
        let nombre = document.getElementById('nombrePrendaRef').value;
        let descripcion = document.getElementById('descPrendaRef').value;
        if(file && nombre) {
            let reader = new FileReader();
            reader.onloadend = () => {
                fetch(`${dbURL}fotos.json`, { method: "POST", body: JSON.stringify({ nombre, descripcion, url: reader.result }) }).then(sincronizar);
            };
            reader.readAsDataURL(file);
        }
    }

    function sincronizar() {
        fetch(`${dbURL}.json`).then(r => r.json()).then(data => {
            if(!data) return;
            // Logo
            if(data.config) document.getElementById('logoCli').src = document.getElementById('logoAdmin').src = data.config.logo;
            
            // Inventario
            let htmlInv = "", total = 0;
            for(let id in data.inventario) {
                total += data.inventario[id].stock;
                htmlInv += `<tr><td>${data.inventario[id].nombre}</td><td>${data.inventario[id].cuello}</td><td>${data.inventario[id].stock}</td></tr>`;
            }
            document.getElementById('bodyInventario').innerHTML = htmlInv;
            document.getElementById('totalStock').innerText = total;

            // Galería
            let htmlGal = "";
            for(let id in data.fotos) {
                htmlGal += `<div class="item-producto"><img src="${data.fotos[id].url}" class="img-preview"><p><b>${data.fotos[id].nombre}</b></p><p style="font-size:12px">${data.fotos[id].descripcion}</p></div>`;
            }
            document.getElementById('galeriaCliente').innerHTML = htmlGal;
        });
    }

    sincronizar();
</script>
</body>
</html>
